<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .spike { fill: #e05555; stroke: #1a1a2e; stroke-width: 1.2; }
    .body  { fill: #e86060; stroke: #1a1a2e; stroke-width: 1.8; }
    .spot  { fill: #c03030; stroke: #1a1a2e; stroke-width: 1.2; }
  </style>

  <!-- spikes -->
  <line x1="50" y1="14" x2="50" y2="7"  stroke="#1a1a2e" stroke-width="1.2"/>
  <ellipse cx="50" cy="5"  rx="4.5" ry="3" class="spike"/>

  <line x1="68" y1="18" x2="73" y2="13" stroke="#1a1a2e" stroke-width="1.2"/>
  <ellipse cx="76" cy="11" rx="4.5" ry="3" transform="rotate(-45,76,11)" class="spike"/>

  <line x1="86" y1="50" x2="93" y2="50" stroke="#1a1a2e" stroke-width="1.2"/>
  <ellipse cx="95.5" cy="50" rx="4.5" ry="3" class="spike"/>

  <line x1="68" y1="68" x2="73" y2="73" stroke="#1a1a2e" stroke-width="1.2"/>
  <ellipse cx="76" cy="76" rx="4.5" ry="3" transform="rotate(45,76,76)" class="spike"/>

  <line x1="50" y1="82" x2="50" y2="89" stroke="#1a1a2e" stroke-width="1.2"/>
  <ellipse cx="50" cy="91.5" rx="4.5" ry="3" class="spike"/>

  <line x1="32" y1="68" x2="27" y2="73" stroke="#1a1a2e" stroke-width="1.2"/>
  <ellipse cx="24" cy="76" rx="4.5" ry="3" transform="rotate(-45,24,76)" class="spike"/>

  <line x1="14" y1="50" x2="7"  y2="50" stroke="#1a1a2e" stroke-width="1.2"/>
  <ellipse cx="4.5" cy="50" rx="4.5" ry="3" class="spike"/>

  <line x1="32" y1="18" x2="27" y2="13" stroke="#1a1a2e" stroke-width="1.2"/>
  <ellipse cx="24" cy="11" rx="4.5" ry="3" transform="rotate(45,24,11)" class="spike"/>

  <!-- virus body -->
  <circle cx="50" cy="50" r="36" class="body"/>
  <!-- highlight -->
  <ellipse cx="38" cy="36" rx="13" ry="9" fill="#ef8888" opacity="0.45"/>
  <!-- spots -->
  <circle cx="40" cy="56" r="9"  class="spot"/>
  <circle cx="58" cy="43" r="5"  class="spot"/>

  <!-- warning triangle -->
  <g transform="translate(58,58)">
    <polygon points="0,-22 19,11 -19,11" fill="#cccccc" stroke="#777" stroke-width="1.8" stroke-linejoin="round"/>
    <polygon points="0,-19 16,9 -16,9"  fill="#f5e642" stroke="#aaa" stroke-width="0.8" stroke-linejoin="round"/>
    <rect x="-2.5" y="-12" width="5" height="14" rx="2" fill="#222"/>
    <circle cx="0" cy="6" r="2.8" fill="#222"/>
  </g>
</svg>
